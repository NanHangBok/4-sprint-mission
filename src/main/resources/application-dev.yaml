server:
  port: 8081
spring:
  application:
    name: discodeit
  servlet:
    multipart:
      maxFileSize: 10MB # 파일 하나의 최대 크기
      maxRequestSize: 30MB  # 한 번에 최대 업로드 가능 용량
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/discodeit_dev
    username: discodeit_user_dev
    password: discodeitdev1234
  #  datasource:
  #    url: jdbc:h2:mem:e2e;DB_CLOSE_DELAY=-1
  #    driver-class-name: org.h2.Driver
  #    username: sa
  #    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    #        default_batch_fetch_size: 100
    open-in-view: false
  sql:
    init:
      mode: never
      schema-locations: classpath:schema-dev.sql
  boot:
    admin:
      client:
        url: http://localhost:9090

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: debug

discodeit:
  storage:
    type: local
    local:
      root-path: .discodeit/storage
